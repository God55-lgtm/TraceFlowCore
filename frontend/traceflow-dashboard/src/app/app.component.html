<mat-toolbar color="primary" class="toolbar" *ngIf="authService.isAuthenticated()">
  <button mat-icon-button (click)="sidenav.toggle()">
    <mat-icon>menu</mat-icon>
  </button>
  
  <!-- Título con separador y versión -->
  <div class="title-with-separator">
    <mat-icon>dashboard</mat-icon>
    <span>TraceFlow</span>
    <span>v1.0</span>
  </div>
  
  <span class="spacer"></span>
  
  <button mat-icon-button (click)="authService.logout()" matTooltip="Cerrar sesión">
    <mat-icon>exit_to_app</mat-icon>
  </button>
</mat-toolbar>

<mat-sidenav-container *ngIf="authService.isAuthenticated()" class="sidenav-container">
  <mat-sidenav #sidenav mode="side" opened class="sidenav">
    <mat-nav-list>
  <a mat-list-item routerLink="/dashboard" routerLinkActive="active">
    <mat-icon>bar_chart</mat-icon>  <!-- Antes: dashboard -->
    <span>Dashboard</span>
  </a>
  <a mat-list-item routerLink="/traces" routerLinkActive="active">
    <mat-icon>timeline</mat-icon>    <!-- Antes: list -->
    <span>Trazas</span>
  </a>
</mat-nav-list>

  </mat-sidenav>

  <mat-sidenav-content class="content">
    <router-outlet></router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>

<router-outlet *ngIf="!authService.isAuthenticated()"></router-outlet>
